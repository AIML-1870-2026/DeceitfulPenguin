<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Switchboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" id="hljs-light" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <link rel="stylesheet" id="hljs-dark" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" disabled />
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .schema-textarea { font-family: 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 0.8rem; }
    .response-content p { margin-bottom: 0.6rem; }
    .response-content h1,.response-content h2,.response-content h3 { font-weight: 600; margin: 0.8rem 0 0.4rem; }
    .response-content ul,.response-content ol { padding-left: 1.5rem; margin-bottom: 0.6rem; }
    .response-content li { margin-bottom: 0.2rem; }
    .response-content code:not(pre code) { background: rgba(127,127,127,0.15); padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; }
    .response-content pre { margin: 0.6rem 0; border-radius: 6px; overflow-x: auto; }
    .response-content pre code { font-size: 0.8rem; }
    .response-content blockquote { border-left: 3px solid #d1d5db; padding-left: 0.8rem; color: #6b7280; margin: 0.5rem 0; }
    .drop-zone.drag-over { border-color: #6366f1; background: rgba(99,102,241,0.08); }
    textarea { outline: none; }
    textarea:focus { box-shadow: 0 0 0 2px rgba(99,102,241,0.4); }
    select:focus { outline: 2px solid rgba(99,102,241,0.4); outline-offset: 0; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ================================================================
    // CONFIG — update model lists here
    // ================================================================
    const MODELS = {
      anthropic: [
        { id: 'claude-opus-4-5',   label: 'Claude Opus 4.5'   },
        { id: 'claude-sonnet-4-5', label: 'Claude Sonnet 4.5' },
        { id: 'claude-haiku-4-5',  label: 'Claude Haiku 4.5'  },
      ],
      openai: [
        { id: 'o3',              label: 'o3'               },
        { id: 'o4-mini',         label: 'o4 mini'          },
        { id: 'o3-mini',         label: 'o3 mini'          },
        { id: 'o1',              label: 'o1'               },
        { id: 'o1-mini',         label: 'o1 mini'          },
        { id: 'gpt-4.1',         label: 'GPT-4.1'          },
        { id: 'gpt-4.1-mini',    label: 'GPT-4.1 mini'     },
        { id: 'gpt-4.1-nano',    label: 'GPT-4.1 nano'     },
        { id: 'gpt-4o',          label: 'GPT-4o'           },
        { id: 'gpt-4o-mini',     label: 'GPT-4o mini'      },
        { id: 'gpt-4-turbo',     label: 'GPT-4 Turbo'      },
        { id: 'gpt-3.5-turbo',   label: 'GPT-3.5 Turbo'   },
      ],
    };

    const OPENAI_JSON_SCHEMA_MODELS = new Set(['gpt-4o', 'gpt-4o-mini']);

    const SCHEMA_PLACEHOLDER = `{
  "type": "object",
  "properties": {
    "answer": { "type": "string" },
    "confidence": { "type": "number" }
  },
  "required": ["answer", "confidence"]
}`;

    // ================================================================
    // UTILITIES
    // ================================================================
    function parseKeyFile(content, filename) {
      const keys = { anthropic: null, openai: null };
      const lower = filename.toLowerCase();

      if (lower.endsWith('.env') || lower === '.env') {
        for (const line of content.split('\n')) {
          const m = line.match(/^\s*([\w_]+)\s*=\s*(.+)\s*$/);
          if (!m) continue;
          const k = m[1].toLowerCase();
          const v = m[2].trim().replace(/^["']|["']$/g, '');
          if (k.includes('anthropic')) keys.anthropic = v;
          else if (k.includes('openai')) keys.openai = v;
        }
      } else if (lower.endsWith('.csv')) {
        const lines = content.split('\n').map(l => l.trim()).filter(Boolean);
        let start = 0;
        if (lines.length > 0) {
          const first = lines[0].toLowerCase();
          if (first.includes('provider') || (first.includes('key') && !first.startsWith('sk-'))) start = 1;
        }
        for (let i = start; i < lines.length; i++) {
          const parts = lines[i].split(',').map(p => p.trim());
          if (parts.length < 2) continue;
          const prov = parts[0].toLowerCase();
          const val  = parts[1];
          if (prov.includes('anthropic')) keys.anthropic = val;
          else if (prov.includes('openai')) keys.openai = val;
        }
      }
      return keys;
    }

    function maskKey(key) {
      if (!key) return '';
      const visible = Math.min(7, key.length);
      return key.slice(0, visible) + '••••••••' + key.slice(-4);
    }

    async function callAnthropic({ key, model, systemPrompt, userPrompt, maxTokens, temperature, jsonSchema }) {
      let system = systemPrompt || '';
      if (jsonSchema) {
        system += (system ? '\n\n' : '') +
          'You must respond with valid JSON conforming exactly to this schema — return only the JSON object, no additional text:\n' +
          jsonSchema;
      }
      const body = {
        model,
        max_tokens: maxTokens,
        temperature,
        messages: [{ role: 'user', content: userPrompt }],
        ...(system ? { system } : {}),
      };
      const start = Date.now();
      let res;
      try {
        res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify(body),
        });
      } catch (networkErr) {
        throw new Error(
          'CORS_BLOCKED: Anthropic blocked this browser request. ' +
          'Direct browser access requires an Anthropic account with the "direct browser access" feature enabled. ' +
          'Most accounts do not have this enabled by default — it is a paid/enterprise feature. ' +
          'To use Anthropic models, consider running a thin local proxy (e.g. a one-line Node/Python script that forwards requests and adds CORS headers), or use the OpenAI models instead. ' +
          `(Original error: ${networkErr.message})`
        );
      }
      const latency = ((Date.now() - start) / 1000).toFixed(1);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      return { text: data.content[0].text, latency, usage: data.usage };
    }

    async function callOpenAI({ key, model, systemPrompt, userPrompt, maxTokens, temperature, jsonSchema }) {
      const messages = [];
      let sysContent = systemPrompt || '';

      const useNativeJsonSchema = jsonSchema && OPENAI_JSON_SCHEMA_MODELS.has(model);

      if (!useNativeJsonSchema && jsonSchema) {
        sysContent += (sysContent ? '\n\n' : '') +
          'You must respond with valid JSON conforming exactly to this schema — return only the JSON object, no additional text:\n' +
          jsonSchema;
      }
      if (sysContent) messages.push({ role: 'system', content: sysContent });
      messages.push({ role: 'user', content: userPrompt });

      const body = { model, max_tokens: maxTokens, temperature, messages };

      if (useNativeJsonSchema) {
        try {
          const schema = JSON.parse(jsonSchema);
          body.response_format = {
            type: 'json_schema',
            json_schema: { name: 'response', schema, strict: true },
          };
        } catch {
          // Fall back to system prompt injection (already done above if we had set it)
          if (sysContent.indexOf('JSON') === -1) {
            messages[0] = { role: 'system', content: (systemPrompt || '') + '\n\nRespond only with valid JSON. Schema:\n' + jsonSchema };
          }
        }
      } else if (jsonSchema) {
        body.response_format = { type: 'json_object' };
      }

      const start = Date.now();
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`,
        },
        body: JSON.stringify(body),
      });
      const latency = ((Date.now() - start) / 1000).toFixed(1);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      return { text: data.choices[0].message.content, latency, usage: data.usage };
    }

    async function callModel({ provider, model, key, systemPrompt, userPrompt, maxTokens, temperature, jsonSchema }) {
      if (provider === 'anthropic') return callAnthropic({ key, model, systemPrompt, userPrompt, maxTokens, temperature, jsonSchema });
      return callOpenAI({ key, model, systemPrompt, userPrompt, maxTokens, temperature, jsonSchema });
    }

    function copyToClipboard(text) {
      navigator.clipboard?.writeText(text).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      });
    }

    function prettyJson(str) {
      try { return JSON.stringify(JSON.parse(str), null, 2); }
      catch { return str; }
    }

    // ================================================================
    // SMALL SHARED UI PIECES
    // ================================================================
    function Btn({ children, onClick, disabled, variant = 'primary', small, className = '' }) {
      const base = 'inline-flex items-center gap-1.5 font-medium rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const size = small ? 'px-2.5 py-1 text-xs' : 'px-4 py-2 text-sm';
      const colors = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white dark:bg-indigo-500 dark:hover:bg-indigo-600',
        secondary: 'bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600',
        danger: 'bg-red-600 hover:bg-red-700 text-white',
        ghost: 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800',
      };
      return (
        <button className={`${base} ${size} ${colors[variant]} ${className}`} onClick={onClick} disabled={disabled}>
          {children}
        </button>
      );
    }

    function Spinner() {
      return (
        <svg className="spin h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" strokeLinecap="round"/>
        </svg>
      );
    }

    function CopyBtn({ text }) {
      const [copied, setCopied] = useState(false);
      return (
        <Btn small variant="secondary" onClick={() => { copyToClipboard(text); setCopied(true); setTimeout(() => setCopied(false), 1500); }}>
          {copied ? '✓ Copied' : 'Copy'}
        </Btn>
      );
    }

    // ================================================================
    // KEY PANEL
    // ================================================================
    function KeyPanel({ keys, onLoad, onClear, collapsed, onToggle }) {
      const [dragging, setDragging] = useState(false);
      const [error, setError]       = useState('');
      const [clearConfirm, setClearConfirm] = useState(false);
      const fileRef = useRef();

      const hasAny = keys.anthropic || keys.openai;

      function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const parsed = parseKeyFile(e.target.result, file.name);
          if (!parsed.anthropic && !parsed.openai) {
            setError('No API keys found. Expected ANTHROPIC_API_KEY and/or OPENAI_API_KEY.');
            return;
          }
          setError('');
          onLoad(parsed);
        };
        reader.readAsText(file);
      }

      function onDrop(e) {
        e.preventDefault(); setDragging(false);
        handleFile(e.dataTransfer.files[0]);
      }

      if (collapsed && hasAny) {
        return (
          <div className="flex items-center gap-3 px-4 py-2 bg-green-50 dark:bg-green-900/20 border-b border-green-200 dark:border-green-800 text-sm">
            <span className="text-green-700 dark:text-green-400 font-medium">🔑 Keys loaded:</span>
            {keys.anthropic && <span className="font-mono text-green-800 dark:text-green-300">{maskKey(keys.anthropic)} (Anthropic)</span>}
            {keys.openai    && <span className="font-mono text-green-800 dark:text-green-300">{maskKey(keys.openai)} (OpenAI)</span>}
            <div className="flex gap-2 ml-auto">
              <Btn small variant="ghost" onClick={onToggle}>Change</Btn>
              {clearConfirm
                ? <><span className="text-xs text-red-600 dark:text-red-400 self-center">Clear all keys?</span>
                    <Btn small variant="danger" onClick={() => { onClear(); setClearConfirm(false); }}>Yes, clear</Btn>
                    <Btn small variant="secondary" onClick={() => setClearConfirm(false)}>Cancel</Btn></>
                : <Btn small variant="secondary" onClick={() => setClearConfirm(true)}>Clear Keys</Btn>
              }
            </div>
          </div>
        );
      }

      return (
        <div className="border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-4">
          <div className="max-w-2xl mx-auto">
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-sm font-semibold text-gray-700 dark:text-gray-300">API Keys</h2>
              {hasAny && <Btn small variant="ghost" onClick={onToggle}>Collapse</Btn>}
            </div>
            <div
              className={`drop-zone border-2 border-dashed rounded-lg p-6 text-center cursor-pointer transition-colors ${dragging ? 'drag-over' : 'border-gray-300 dark:border-gray-600 hover:border-indigo-400 dark:hover:border-indigo-500'}`}
              onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
              onDragLeave={() => setDragging(false)}
              onDrop={onDrop}
              onClick={() => fileRef.current.click()}
            >
              <div className="text-3xl mb-2">📂</div>
              <p className="text-sm font-medium text-gray-700 dark:text-gray-300">Drop your key file here, or click to browse</p>
              <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">Accepts <code className="bg-gray-100 dark:bg-gray-800 px-1 rounded">.env</code> or <code className="bg-gray-100 dark:bg-gray-800 px-1 rounded">.csv</code> files</p>
              <input ref={fileRef} type="file" accept=".env,.csv,text/*" className="hidden" onChange={(e) => handleFile(e.target.files[0])} />
            </div>
            {error && <p className="mt-2 text-sm text-red-600 dark:text-red-400">{error}</p>}
            {hasAny && (
              <div className="mt-3 flex flex-wrap gap-3 items-center">
                {keys.anthropic && (
                  <span className="inline-flex items-center gap-1.5 text-xs bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300 px-3 py-1 rounded-full font-mono">
                    Anthropic: {maskKey(keys.anthropic)} ✓
                  </span>
                )}
                {keys.openai && (
                  <span className="inline-flex items-center gap-1.5 text-xs bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300 px-3 py-1 rounded-full font-mono">
                    OpenAI: {maskKey(keys.openai)} ✓
                  </span>
                )}
                {clearConfirm
                  ? <><span className="text-xs text-red-600 dark:text-red-400">Clear all keys?</span>
                      <Btn small variant="danger" onClick={() => { onClear(); setClearConfirm(false); }}>Yes, clear</Btn>
                      <Btn small variant="secondary" onClick={() => setClearConfirm(false)}>Cancel</Btn></>
                  : <Btn small variant="secondary" onClick={() => setClearConfirm(true)}>Clear Keys</Btn>
                }
              </div>
            )}
            <p className="mt-3 text-xs text-amber-600 dark:text-amber-400">
              ⚠ Keys are stored in memory only — they will be lost on page refresh.
            </p>
          </div>
        </div>
      );
    }

    // ================================================================
    // SETTINGS PANEL
    // ================================================================
    function SettingsPanel({ settings, onChange, isOpen, compareMode }) {
      const [perModel, setPerModel] = useState(false);

      if (!isOpen) return null;

      function field(label, content) {
        return (
          <div>
            <label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">{label}</label>
            {content}
          </div>
        );
      }

      const inputCls = "w-full rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent";

      return (
        <div className="border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-850 px-4 py-4">
          <div className="max-w-2xl mx-auto space-y-4">
            <h3 className="text-sm font-semibold text-gray-700 dark:text-gray-300">Settings</h3>
            <div className="grid grid-cols-2 gap-4">
              {field('Max Tokens',
                <input type="number" min="1" max="8192" value={settings.maxTokens}
                  className={inputCls}
                  onChange={e => onChange({ ...settings, maxTokens: parseInt(e.target.value) || 1024 })} />
              )}
              {field(`Temperature: ${settings.temperature.toFixed(1)}`,
                <input type="range" min="0" max="2" step="0.1" value={settings.temperature}
                  className="w-full accent-indigo-600"
                  onChange={e => onChange({ ...settings, temperature: parseFloat(e.target.value) })} />
              )}
            </div>
            {field('System Prompt (optional)',
              <textarea value={settings.systemPrompt} rows={3}
                className={`${inputCls} resize-y font-mono text-xs`}
                placeholder="You are a helpful assistant..."
                onChange={e => onChange({ ...settings, systemPrompt: e.target.value })} />
            )}
          </div>
        </div>
      );
    }

    // ================================================================
    // MODEL SELECTOR
    // ================================================================
    function ModelSelector({ value, onChange, keys, label }) {
      const { provider, model } = value;

      const selectCls = "rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500";

      return (
        <div className="flex items-center gap-2 flex-wrap">
          {label && <span className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">{label}</span>}
          <select
            className={selectCls}
            value={provider}
            onChange={e => onChange({ provider: e.target.value, model: MODELS[e.target.value]?.[0]?.id || '' })}
          >
            <option value="">Provider</option>
            <option value="anthropic" disabled={!keys.anthropic}>Anthropic{!keys.anthropic ? ' (no key)' : ''}</option>
            <option value="openai"    disabled={!keys.openai}>OpenAI{!keys.openai ? ' (no key)' : ''}</option>
          </select>
          <select
            className={selectCls}
            value={model}
            disabled={!provider}
            onChange={e => onChange({ provider, model: e.target.value })}
          >
            <option value="">Model</option>
            {(MODELS[provider] || []).map(m => (
              <option key={m.id} value={m.id}>{m.label}</option>
            ))}
          </select>
        </div>
      );
    }

    // ================================================================
    // FORMAT SELECTOR + SCHEMA
    // ================================================================
    function FormatSection({ format, onChange, schema, onSchemaChange, schemaError, onSetSchemaError }) {
      function validate() {
        if (!schema.trim()) { onSetSchemaError('Schema cannot be empty.'); return false; }
        try { JSON.parse(schema); onSetSchemaError(''); return true; }
        catch (e) { onSetSchemaError('Invalid JSON: ' + e.message); return false; }
      }

      const btnBase = "px-3 py-1.5 text-sm rounded-md border transition-colors";
      const active  = "bg-indigo-600 text-white border-indigo-600";
      const inactive= "bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700";

      return (
        <div className="space-y-2">
          <div className="flex items-center gap-1">
            <span className="text-xs font-medium text-gray-500 dark:text-gray-400 mr-2">Response Format:</span>
            <button className={`${btnBase} ${format === 'unstructured' ? active : inactive}`} onClick={() => onChange('unstructured')}>Unstructured</button>
            <button className={`${btnBase} ${format === 'structured'   ? active : inactive}`} onClick={() => onChange('structured')}>Structured (JSON)</button>
          </div>
          {format === 'structured' && (
            <div className="border border-gray-200 dark:border-gray-700 rounded-lg p-3 bg-gray-50 dark:bg-gray-800/50 space-y-2">
              <div className="flex items-center justify-between">
                <span className="text-xs font-medium text-gray-600 dark:text-gray-400">JSON Schema</span>
                <Btn small variant="secondary" onClick={validate}>Validate Schema</Btn>
              </div>
              <textarea
                className="schema-textarea w-full rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 p-2 text-xs resize-y min-h-[8rem] max-h-[16rem]"
                placeholder={SCHEMA_PLACEHOLDER}
                value={schema}
                onChange={e => { onSchemaChange(e.target.value); onSetSchemaError(''); }}
                onBlur={validate}
                spellCheck={false}
              />
              {schemaError && <p className="text-xs text-red-600 dark:text-red-400">{schemaError}</p>}
            </div>
          )}
        </div>
      );
    }

    // ================================================================
    // RESPONSE PANEL
    // ================================================================
    function ResponsePanel({ result, loading, format, label }) {
      const codeRef = useRef();

      useEffect(() => {
        if (result && format === 'structured' && codeRef.current) {
          hljs.highlightElement(codeRef.current);
        }
      }, [result, format]);

      const panelCls = "rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 overflow-hidden";

      if (!result && !loading) {
        return (
          <div className={`${panelCls} flex items-center justify-center h-32 text-gray-400 dark:text-gray-600 text-sm`}>
            {label ? <span>{label} — response will appear here</span> : <span>Response will appear here</span>}
          </div>
        );
      }

      if (loading) {
        return (
          <div className={`${panelCls} flex items-center justify-center h-32 gap-2 text-indigo-500`}>
            <Spinner /><span className="text-sm">Waiting for response…</span>
          </div>
        );
      }

      if (result.error) {
        const isCors = result.error.startsWith('CORS_BLOCKED:');
        const displayError = isCors ? result.error.replace('CORS_BLOCKED: ', '') : result.error;
        // Split into sentences for the CORS case so we can highlight the first one
        const [firstSentence, ...rest] = isCors ? displayError.split('. ') : [displayError];
        return (
          <div className={`${panelCls} p-4`}>
            <div className="flex items-start gap-2 text-red-600 dark:text-red-400">
              <span className="text-lg">⚠</span>
              <div className="space-y-1">
                <p className="font-medium text-sm">{isCors ? 'CORS / Browser Access Blocked' : 'API Error'}</p>
                <p className="text-xs font-semibold">{firstSentence}{isCors ? '.' : ''}</p>
                {isCors && rest.length > 0 && (
                  <p className="text-xs text-red-500 dark:text-red-400 leading-relaxed">{rest.join('. ')}</p>
                )}
                {!isCors && <p className="text-xs mt-0.5 font-mono">{displayError}</p>}
              </div>
            </div>
          </div>
        );
      }

      const displayText = format === 'structured' ? prettyJson(result.text) : result.text;
      const usageStr = result.usage
        ? (() => {
            const u = result.usage;
            // Anthropic: input_tokens / output_tokens; OpenAI: prompt_tokens / completion_tokens
            const inp  = u.input_tokens  ?? u.prompt_tokens;
            const out  = u.output_tokens ?? u.completion_tokens;
            const total = u.total_tokens ?? (inp + out);
            return total ? `${total.toLocaleString()} tokens` : null;
          })()
        : null;

      return (
        <div className={panelCls}>
          <div className="p-4 overflow-auto max-h-[28rem]">
            {format === 'structured' ? (
              <pre className="text-xs"><code ref={codeRef} className="language-json">{displayText}</code></pre>
            ) : (
              <div
                className="response-content text-sm leading-relaxed"
                dangerouslySetInnerHTML={{ __html: marked.parse(displayText) }}
              />
            )}
          </div>
          <div className="border-t border-gray-100 dark:border-gray-800 px-4 py-2 flex items-center gap-3 text-xs text-gray-500 dark:text-gray-400 flex-wrap">
            {result.model && <span className="font-mono">{result.model}</span>}
            {result.latency && <span>{result.latency}s</span>}
            {usageStr && <span>{usageStr}</span>}
            <div className="ml-auto"><CopyBtn text={result.text} /></div>
          </div>
        </div>
      );
    }

    // ================================================================
    // EXAMPLE PROMPTS
    // ================================================================
    const EXAMPLE_PROMPTS = [
      { label: 'Explain a concept', text: 'Explain how transformers work in machine learning, using an analogy that would make sense to someone with no ML background.' },
      { label: 'Write code', text: 'Write a Python function that takes a list of integers and returns all pairs that sum to a target value. Include type hints and a brief docstring.' },
      { label: 'Summarize', text: 'Summarize the key differences between REST and GraphQL APIs. Focus on when you would choose one over the other.' },
      { label: 'Structured output', text: 'List the 5 most populated countries in the world with their approximate populations and capital cities.' },
      { label: 'Creative writing', text: 'Write a two-paragraph opening to a noir detective story set in a near-future city where memories can be bought and sold.' },
      { label: 'Debug help', text: 'My JavaScript async function sometimes returns undefined even though I await it. What are the most common reasons this happens and how do I fix each one?' },
    ];

    // ================================================================
    // PROMPT AREA
    // ================================================================
    function PromptArea({ value, onChange, onClear }) {
      const [clearConfirm, setClearConfirm] = useState(false);
      return (
        <div className="space-y-2">
          <div className="flex items-center justify-between">
            <label className="text-xs font-medium text-gray-600 dark:text-gray-400 uppercase tracking-wide">Prompt</label>
            <div className="flex items-center gap-2">
              <span className="text-xs text-gray-400 dark:text-gray-500">{value.length} chars</span>
              {clearConfirm
                ? <><span className="text-xs text-red-600 dark:text-red-400">Clear prompt?</span>
                    <Btn small variant="danger" onClick={() => { onClear(); setClearConfirm(false); }}>Yes</Btn>
                    <Btn small variant="secondary" onClick={() => setClearConfirm(false)}>No</Btn></>
                : <Btn small variant="ghost" onClick={() => setClearConfirm(true)}>Clear</Btn>
              }
            </div>
          </div>
          <textarea
            value={value}
            onChange={e => onChange(e.target.value)}
            rows={6}
            placeholder="Enter your prompt here…"
            style={{ minHeight: '6rem', maxHeight: '24rem' }}
            className="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 px-3 py-2 text-sm resize-y leading-relaxed"
          />
          <div className="flex flex-wrap gap-1.5">
            <span className="text-xs text-gray-400 dark:text-gray-500 self-center mr-0.5">Examples:</span>
            {EXAMPLE_PROMPTS.map(ex => (
              <button
                key={ex.label}
                title={ex.text}
                onClick={() => onChange(ex.text)}
                className="text-xs px-2.5 py-1 rounded-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:border-indigo-400 hover:text-indigo-600 dark:hover:border-indigo-500 dark:hover:text-indigo-400 transition-colors"
              >
                {ex.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ================================================================
    // SINGLE VIEW
    // ================================================================
    function SingleView({ keys, settings }) {
      const [model,       setModel]       = useState({ provider: '', model: '' });
      const [prompt,      setPrompt]      = useState('');
      const [format,      setFormat]      = useState('unstructured');
      const [schema,      setSchema]      = useState('');
      const [schemaError, setSchemaError] = useState('');
      const [loading,     setLoading]     = useState(false);
      const [result,      setResult]      = useState(null);

      const canSubmit = model.provider && model.model && prompt.trim()
        && !(format === 'structured' && schemaError)
        && !loading;

      async function handleSend() {
        if (!canSubmit) return;
        const key = keys[model.provider];
        if (!key) { setResult({ error: `No API key loaded for ${model.provider}.` }); return; }

        setLoading(true); setResult(null);
        try {
          const res = await callModel({
            provider: model.provider, model: model.model, key,
            systemPrompt: settings.systemPrompt,
            userPrompt: prompt,
            maxTokens: settings.maxTokens,
            temperature: settings.temperature,
            jsonSchema: format === 'structured' ? schema : null,
          });
          setResult({ ...res, model: model.model });
        } catch (e) {
          setResult({ error: e.message });
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="max-w-2xl mx-auto px-4 py-6 space-y-5">
          <ModelSelector value={model} onChange={setModel} keys={keys} />
          <PromptArea value={prompt} onChange={setPrompt} onClear={() => setPrompt('')} />
          <FormatSection
            format={format} onChange={setFormat}
            schema={schema} onSchemaChange={setSchema}
            schemaError={schemaError} onSetSchemaError={setSchemaError}
          />
          <div className="flex justify-end">
            <Btn onClick={handleSend} disabled={!canSubmit}>
              {loading && <Spinner />}
              Send
            </Btn>
          </div>
          <ResponsePanel result={result} loading={loading} format={format} />
        </div>
      );
    }

    // ================================================================
    // COMPARE VIEW
    // ================================================================
    function CompareView({ keys, settings }) {
      const [modelA,      setModelA]      = useState({ provider: '', model: '' });
      const [modelB,      setModelB]      = useState({ provider: '', model: '' });
      const [prompt,      setPrompt]      = useState('');
      const [format,      setFormat]      = useState('unstructured');
      const [schema,      setSchema]      = useState('');
      const [schemaError, setSchemaError] = useState('');
      const [loadingA,    setLoadingA]    = useState(false);
      const [loadingB,    setLoadingB]    = useState(false);
      const [resultA,     setResultA]     = useState(null);
      const [resultB,     setResultB]     = useState(null);

      const loading = loadingA || loadingB;
      const canSubmit = modelA.provider && modelA.model && modelB.provider && modelB.model
        && prompt.trim() && !(format === 'structured' && schemaError) && !loading;

      async function handleSendBoth() {
        if (!canSubmit) return;
        setResultA(null); setResultB(null);
        const jSchema = format === 'structured' ? schema : null;
        const base = { systemPrompt: settings.systemPrompt, userPrompt: prompt, maxTokens: settings.maxTokens, temperature: settings.temperature, jsonSchema: jSchema };

        const runA = async () => {
          const key = keys[modelA.provider];
          if (!key) { setResultA({ error: `No API key for ${modelA.provider}.` }); return; }
          setLoadingA(true);
          try {
            const res = await callModel({ provider: modelA.provider, model: modelA.model, key, ...base });
            setResultA({ ...res, model: modelA.model });
          } catch (e) { setResultA({ error: e.message }); }
          finally { setLoadingA(false); }
        };

        const runB = async () => {
          const key = keys[modelB.provider];
          if (!key) { setResultB({ error: `No API key for ${modelB.provider}.` }); return; }
          setLoadingB(true);
          try {
            const res = await callModel({ provider: modelB.provider, model: modelB.model, key, ...base });
            setResultB({ ...res, model: modelB.model });
          } catch (e) { setResultB({ error: e.message }); }
          finally { setLoadingB(false); }
        };

        runA(); runB(); // parallel, intentionally not awaited together
      }

      return (
        <div className="max-w-5xl mx-auto px-4 py-6 space-y-5">
          {/* Model selectors side by side */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div className="bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 p-3">
              <ModelSelector value={modelA} onChange={setModelA} keys={keys} label="Model A" />
            </div>
            <div className="bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 p-3">
              <ModelSelector value={modelB} onChange={setModelB} keys={keys} label="Model B" />
            </div>
          </div>

          <PromptArea value={prompt} onChange={setPrompt} onClear={() => setPrompt('')} />

          <FormatSection
            format={format} onChange={setFormat}
            schema={schema} onSchemaChange={setSchema}
            schemaError={schemaError} onSetSchemaError={setSchemaError}
          />

          <div className="flex justify-end">
            <Btn onClick={handleSendBoth} disabled={!canSubmit}>
              {loading && <Spinner />}
              Send to Both
            </Btn>
          </div>

          {/* Response panels side by side */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Response A</p>
              <ResponsePanel result={resultA} loading={loadingA} format={format} label="Model A" />
            </div>
            <div>
              <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Response B</p>
              <ResponsePanel result={resultB} loading={loadingB} format={format} label="Model B" />
            </div>
          </div>
        </div>
      );
    }

    // ================================================================
    // APP ROOT
    // ================================================================
    function App() {
      const [mode,         setMode]         = useState('single');
      const [theme,        setTheme]        = useState(() =>
        window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      );
      const [keys,         setKeys]         = useState({ anthropic: null, openai: null });
      const [keyCollapsed, setKeyCollapsed] = useState(false);
      const [settings,     setSettings]     = useState({ maxTokens: 1024, temperature: 1.0, systemPrompt: '' });
      const [settingsOpen, setSettingsOpen] = useState(false);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.getElementById('hljs-light').disabled = (theme === 'dark');
        document.getElementById('hljs-dark').disabled  = (theme === 'light');
      }, [theme]);

      function handleKeysLoaded(parsed) {
        setKeys(prev => ({ anthropic: parsed.anthropic || prev.anthropic, openai: parsed.openai || prev.openai }));
        setKeyCollapsed(true);
      }

      function handleKeysClear() {
        setKeys({ anthropic: null, openai: null });
        setKeyCollapsed(false);
      }

      const tabBase = "px-4 py-2 text-sm font-medium rounded-md transition-colors";
      const tabActive = "bg-white dark:bg-gray-800 text-indigo-600 dark:text-indigo-400 shadow-sm";
      const tabInactive = "text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200";

      return (
        <div className="min-h-screen flex flex-col bg-gray-100 dark:bg-gray-950">
          {/* Header */}
          <header className="sticky top-0 z-20 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 shadow-sm">
            <div className="max-w-5xl mx-auto px-4 h-14 flex items-center gap-4">
              <span className="font-bold text-gray-800 dark:text-gray-100 tracking-tight mr-2">LLM Switchboard</span>
              <div className="flex items-center gap-1 bg-gray-100 dark:bg-gray-800 rounded-lg p-1">
                <button className={`${tabBase} ${mode === 'single'  ? tabActive : tabInactive}`} onClick={() => setMode('single')}>Single</button>
                <button className={`${tabBase} ${mode === 'compare' ? tabActive : tabInactive}`} onClick={() => setMode('compare')}>Compare</button>
              </div>
              <div className="flex items-center gap-2 ml-auto">
                <button
                  title="Settings"
                  className="p-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                  onClick={() => setSettingsOpen(o => !o)}
                >⚙</button>
                <button
                  title="Toggle theme"
                  className="p-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                  onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')}
                >{theme === 'light' ? '🌙' : '☀️'}</button>
              </div>
            </div>
          </header>

          <KeyPanel
            keys={keys}
            onLoad={handleKeysLoaded}
            onClear={handleKeysClear}
            collapsed={keyCollapsed}
            onToggle={() => setKeyCollapsed(c => !c)}
          />

          <SettingsPanel settings={settings} onChange={setSettings} isOpen={settingsOpen} compareMode={mode === 'compare'} />

          <main className="flex-1">
            {mode === 'single'
              ? <SingleView  keys={keys} settings={settings} />
              : <CompareView keys={keys} settings={settings} />
            }
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
