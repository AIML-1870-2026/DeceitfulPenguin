<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Briefing — Aviation Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#d6e8f7;
  --panel:rgba(255,255,255,.85);
  --panel-solid:#f0f5fa;
  --panel-border:rgba(150,180,210,.4);
  --label:#5a7a9a;
  --text:#2a3a4a;
  --value:#1a2a3a;
  --accent:#0077bb;
  --accent-dim:rgba(0,119,187,.1);
  --amber:#e89530;
  --danger:#d03040;
  --font-mono:'JetBrains Mono',monospace;
  --font-label:'Barlow Condensed',sans-serif;
  --sidebar-w:370px;
}

body{
  background:var(--bg);
  background:linear-gradient(135deg, #b8d8f0 0%, #d6e8f7 40%, #e8f2fc 100%);
  color:var(--text);
  font-family:var(--font-mono);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* Background planes */
.bg-planes{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.bg-plane{
  position:absolute;
  opacity:.06;
  fill:#4a7a9f;
}

.bg-plane.p1{ top:6%; left:3%; width:180px; transform:rotate(-8deg); animation:drift1 50s ease-in-out infinite; }
.bg-plane.p2{ top:22%; right:5%; width:130px; transform:rotate(5deg) scaleX(-1); animation:drift2 60s ease-in-out infinite; opacity:.05; }
.bg-plane.p3{ top:50%; left:10%; width:200px; transform:rotate(-3deg); animation:drift3 70s ease-in-out infinite; opacity:.04; }
.bg-plane.p4{ top:72%; right:12%; width:150px; transform:rotate(12deg) scaleX(-1); animation:drift1 55s ease-in-out infinite; opacity:.035; }
.bg-plane.p5{ top:38%; left:55%; width:110px; transform:rotate(-18deg); animation:drift2 48s ease-in-out infinite; opacity:.04; }

@keyframes drift1{
  0%{transform:translateX(0) rotate(-15deg)}
  50%{transform:translateX(30px) rotate(-12deg)}
  100%{transform:translateX(0) rotate(-15deg)}
}
@keyframes drift2{
  0%{transform:translateX(0) rotate(10deg) scaleX(-1)}
  50%{transform:translateX(-25px) rotate(12deg) scaleX(-1)}
  100%{transform:translateX(0) rotate(10deg) scaleX(-1)}
}
@keyframes drift3{
  0%{transform:translateX(0) rotate(-5deg)}
  50%{transform:translateX(20px) rotate(-3deg)}
  100%{transform:translateX(0) rotate(-5deg)}
}

/* Layout */
.dashboard{
  display:flex;
  min-height:100vh;
  position:relative;
  z-index:1;
}

/* Left sidebar */
.sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(16px);
  border-right:1px solid var(--panel-border);
  padding:28px 24px;
  display:flex;
  flex-direction:column;
  gap:0;
}

/* Seal / Logo */
.seal-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:24px;
}

.seal{
  width:72px;
  height:72px;
  flex-shrink:0;
  position:relative;
}

.seal-ring{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2.5px solid var(--accent);
  box-shadow:0 0 0 1px rgba(0,119,187,.15), inset 0 0 0 1px rgba(0,119,187,.15);
}

.seal-ring-inner{
  position:absolute;
  inset:4px;
  border-radius:50%;
  border:1px solid rgba(0,119,187,.3);
}

.seal-img{
  position:absolute;
  inset:8px;
  border-radius:50%;
  overflow:hidden;
  background:rgba(255,255,255,.9);
  display:flex;
  align-items:center;
  justify-content:center;
}

.seal-img img{
  width:80%;
  height:80%;
  object-fit:contain;
  filter:brightness(0) saturate(100%) invert(30%) sepia(60%) saturate(600%) hue-rotate(175deg) brightness(90%) contrast(95%);
}

/* Seal text that wraps around — using SVG */
.seal-text{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.seal-text svg{
  width:100%;
  height:100%;
}

.seal-title{
  flex:1;
}

.seal-title h1{
  font-family:var(--font-label);
  font-weight:700;
  font-size:1rem;
  letter-spacing:5px;
  text-transform:uppercase;
  color:var(--value);
  line-height:1.2;
}

.seal-title .tagline{
  font-family:var(--font-label);
  font-size:.7rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--label);
  margin-top:2px;
}

.seal-title .accent-line{
  width:32px;
  height:2px;
  background:var(--accent);
  margin:6px 0 0;
  box-shadow:0 0 6px rgba(0,119,187,.4);
}

/* Search */
.search-section{
  margin-bottom:20px;
  position:relative;
}

.search-wrap{
  display:flex;
  gap:0;
}

.search-wrap input{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-right:none;
  border-radius:4px 0 0 4px;
  color:var(--value);
  font-family:var(--font-mono);
  font-size:.85rem;
  padding:11px 14px;
  flex:1;
  min-width:0;
  outline:none;
  transition:border-color .2s;
}

.search-wrap input:focus{
  border-color:var(--accent);
}

.search-wrap input::placeholder{
  color:var(--label);
  font-size:.8rem;
}

.search-wrap button{
  background:var(--accent-dim);
  border:1px solid var(--accent);
  border-radius:0 4px 4px 0;
  color:var(--accent);
  font-family:var(--font-label);
  font-weight:600;
  font-size:.8rem;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:11px 16px;
  cursor:pointer;
  transition:background .2s, box-shadow .2s;
  white-space:nowrap;
}

.search-wrap button:hover{
  background:rgba(0,119,187,.2);
  box-shadow:0 2px 10px rgba(0,100,180,.2);
}

/* Autocomplete dropdown */
.autocomplete-list{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:#fff;
  border:1px solid var(--panel-border);
  border-top:none;
  border-radius:0 0 6px 6px;
  box-shadow:0 8px 24px rgba(0,50,100,.12);
  z-index:100;
  max-height:260px;
  overflow-y:auto;
  display:none;
}

.autocomplete-list.visible{
  display:block;
}

.autocomplete-item{
  padding:10px 14px;
  cursor:pointer;
  font-family:var(--font-mono);
  font-size:.82rem;
  color:var(--value);
  border-bottom:1px solid rgba(150,180,210,.15);
  transition:background .15s;
  display:flex;
  align-items:center;
  gap:10px;
}

.autocomplete-item:last-child{
  border-bottom:none;
}

.autocomplete-item:hover,
.autocomplete-item.active{
  background:var(--accent-dim);
}

.autocomplete-item .ac-city{
  font-weight:600;
}

.autocomplete-item .ac-region{
  color:var(--label);
  font-size:.75rem;
}

/* Error */
.error-msg{
  color:var(--danger);
  font-family:var(--font-label);
  font-size:.85rem;
  letter-spacing:1px;
  margin-bottom:12px;
  display:none;
}

.error-msg.visible{display:block}

/* City hero in sidebar */
.city-hero{
  display:none;
  margin-bottom:20px;
}

.city-hero.visible{
  display:block;
}

.city-hero .city-name{
  font-family:var(--font-label);
  font-weight:700;
  font-size:1.7rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--value);
  line-height:1.15;
}

.city-hero .description{
  font-family:var(--font-label);
  font-size:.9rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--accent);
  margin-top:4px;
}

.city-hero .coords{
  font-size:.65rem;
  color:var(--label);
  margin-top:4px;
}

/* Sidebar weather summary */
.sidebar-summary{
  display:none;
  flex-direction:column;
  gap:14px;
  flex:1;
}

.sidebar-summary.visible{
  display:flex;
}

.summary-big{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:8px;
  padding:18px;
}

.summary-big .big-value{
  font-family:var(--font-mono);
  font-weight:700;
  font-size:2.8rem;
  color:var(--value);
  line-height:1;
}

.summary-big .big-unit{
  font-weight:400;
  font-size:1.1rem;
  color:var(--accent);
  margin-left:2px;
}

.summary-big .big-label{
  font-family:var(--font-label);
  font-weight:600;
  font-size:.7rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--label);
  margin-bottom:6px;
}

.summary-big .big-sub{
  font-size:.78rem;
  color:var(--label);
  margin-top:4px;
}

/* Wind mini display in sidebar */
.wind-mini{
  display:flex;
  align-items:center;
  gap:14px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:8px;
  padding:14px 16px;
}

.wind-mini .wind-compass-sm{
  width:52px;
  height:52px;
  flex-shrink:0;
}

.wind-mini .wind-compass-sm svg{
  width:100%;
  height:100%;
}

.wind-mini .wind-info{
  flex:1;
}

.wind-mini .wind-info .wind-speed-val{
  font-family:var(--font-mono);
  font-weight:700;
  font-size:1.3rem;
  color:var(--value);
}

.wind-mini .wind-info .wind-speed-unit{
  font-weight:400;
  font-size:.8rem;
  color:var(--accent);
}

.wind-mini .wind-info .wind-dir-text{
  font-size:.75rem;
  color:var(--label);
  margin-top:2px;
}

/* Feels like card in sidebar */
.feels-like-card{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:8px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.feels-like-card .fl-label{
  font-family:var(--font-label);
  font-weight:600;
  font-size:.7rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--label);
}

.feels-like-card .fl-value{
  font-family:var(--font-mono);
  font-weight:700;
  font-size:1.3rem;
  color:var(--value);
}

.feels-like-card .fl-unit{
  font-weight:400;
  font-size:.85rem;
  color:var(--accent);
}

/* Sun times in sidebar */
.sun-times{
  display:flex;
  gap:10px;
}

.sun-times .sun-card{
  flex:1;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:8px;
  padding:12px 14px;
  text-align:center;
}

.sun-card .sun-icon{
  font-size:1.1rem;
  margin-bottom:4px;
}

.sun-card .sun-label{
  font-family:var(--font-label);
  font-weight:600;
  font-size:.65rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--label);
  margin-bottom:4px;
}

.sun-card .sun-value{
  font-family:var(--font-mono);
  font-weight:600;
  font-size:.9rem;
  color:var(--value);
}

.sidebar-footer{
  margin-top:auto;
  padding-top:16px;
  font-size:.65rem;
  color:var(--label);
}

.sidebar-footer span{
  color:var(--accent);
}

/* Right main area */
.main-area{
  flex:1;
  padding:28px 28px 36px;
  display:flex;
  flex-direction:column;
}

.main-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

.main-header h2{
  font-family:var(--font-label);
  font-weight:600;
  font-size:.8rem;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--label);
}

.main-header .update-time{
  font-size:.7rem;
  color:var(--label);
  display:none;
}

.main-header .update-time.visible{
  display:block;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  grid-template-rows:repeat(3, 1fr);
  gap:14px;
  flex:1;
}

/* Card */
.card{
  background:var(--panel);
  backdrop-filter:blur(10px);
  border:1px solid var(--panel-border);
  border-radius:8px;
  padding:20px 20px 16px;
  position:relative;
  box-shadow:0 2px 8px rgba(0,50,100,.06);
  transition:border-color .3s, box-shadow .3s;
  opacity:0;
  transform:translateY(12px);
  animation:fadeUp .5s ease forwards;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.2s}
.card:nth-child(5){animation-delay:.25s}
.card:nth-child(6){animation-delay:.3s}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

.card:hover{
  border-color:var(--accent);
  box-shadow:0 4px 20px rgba(0,100,180,.12);
}

.card .card-label{
  font-family:var(--font-label);
  font-weight:600;
  font-size:.72rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--label);
  margin-bottom:10px;
}

.card .card-value{
  font-family:var(--font-mono);
  font-weight:700;
  font-size:1.6rem;
  color:var(--value);
  line-height:1.2;
}

.card .card-sub{
  font-family:var(--font-mono);
  font-size:.78rem;
  color:var(--label);
  margin-top:6px;
}

.card .card-unit{
  font-weight:400;
  font-size:.9rem;
  color:var(--accent);
  margin-left:4px;
}

/* Loading pulse */
.card.loading .card-value,
.card.loading .card-sub{
  background:linear-gradient(90deg, #ccd8e8 25%, #e0eaf4 50%, #ccd8e8 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:4px;
  color:transparent !important;
  min-height:1.6rem;
  min-width:80px;
  display:inline-block;
}

.card.loading .card-sub{
  min-height:1rem;
  min-width:60px;
  margin-top:8px;
}

@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* Responsive */
@media(max-width:900px){
  .dashboard{
    flex-direction:column;
  }
  .sidebar{
    width:100%;
    min-width:0;
    border-right:none;
    border-bottom:1px solid var(--panel-border);
    padding:20px 20px;
  }
  .main-area{
    padding:20px 20px 40px;
  }
  .grid{
    grid-template-columns:repeat(2, 1fr);
    grid-template-rows:auto;
  }
}

@media(max-width:550px){
  .grid{
    grid-template-columns:1fr;
  }
  .seal-header{
    flex-direction:column;
    text-align:center;
  }
  .seal-title .accent-line{
    margin:6px auto 0;
  }
}
</style>
</head>
<body>

<!-- Background planes -->
<div class="bg-planes">
  <svg class="bg-plane p1" viewBox="0 0 200 60">
    <path d="M10 30 Q10 25 20 24 L60 20 L80 8 L85 8 L75 20 L160 18 Q175 18 185 22 L195 26 Q200 28 200 30 Q200 32 195 34 L185 38 Q175 42 160 42 L75 40 L85 52 L80 52 L60 40 L20 36 Q10 35 10 30Z" />
    <ellipse cx="55" cy="30" rx="3" ry="5" fill="rgba(255,255,255,.3)"/>
    <ellipse cx="65" cy="30" rx="3" ry="5" fill="rgba(255,255,255,.3)"/>
    <ellipse cx="75" cy="30" rx="3" ry="5" fill="rgba(255,255,255,.3)"/>
    <path d="M130 42 L135 55 L145 55 L140 42" />
    <path d="M50 20 L45 8 L55 8 L55 20" />
  </svg>
  <svg class="bg-plane p2" viewBox="0 0 160 50">
    <path d="M5 25 Q5 22 12 21 L50 18 L65 5 L70 5 L62 18 L130 17 Q145 17 152 22 L158 25 Q160 26 158 28 L152 31 Q145 36 130 36 L62 35 L70 48 L65 48 L50 35 L12 32 Q5 31 5 25Z" />
    <circle cx="158" cy="25" r="4" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
  </svg>
  <svg class="bg-plane p3" viewBox="0 0 220 70">
    <path d="M8 35 Q8 28 22 27 L70 22 L90 6 L96 6 L84 22 L175 19 Q195 19 208 25 L216 30 Q220 33 220 35 Q220 37 216 40 L208 45 Q195 51 175 51 L84 48 L96 64 L90 64 L70 48 L22 43 Q8 42 8 35Z" />
    <path d="M60 22 L54 6 L66 6 L66 22" />
    <path d="M145 51 L150 65 L162 65 L157 51" />
    <rect x="40" y="31" width="100" height="2" rx="1" fill="rgba(255,255,255,.15)"/>
  </svg>
  <svg class="bg-plane p4" viewBox="0 0 180 55">
    <path d="M6 28 Q6 24 15 23 L55 19 L72 6 L77 6 L68 19 L145 17 Q162 17 172 22 L178 26 Q180 27 180 28 Q180 29 178 30 L172 34 Q162 39 145 39 L68 37 L77 50 L72 50 L55 37 L15 33 Q6 32 6 28Z" />
  </svg>
  <svg class="bg-plane p5" viewBox="0 0 140 45">
    <path d="M5 22 Q5 19 12 18 L42 15 L55 5 L59 5 L52 15 L112 14 Q125 14 132 18 L138 21 Q140 22 140 23 Q140 24 138 25 L132 28 Q125 32 112 32 L52 31 L59 41 L55 41 L42 31 L12 28 Q5 27 5 22Z" />
  </svg>
</div>

<div class="dashboard">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">

    <!-- Seal logo + title -->
    <div class="seal-header">
      <div class="seal">
        <div class="seal-ring"></div>
        <div class="seal-ring-inner"></div>
        <div class="seal-img">
          <img src="generated-images/simple airplane icon.png" alt="Aviation seal">
        </div>
        <div class="seal-text">
          <svg viewBox="0 0 72 72">
            <defs>
              <path id="seal-top" d="M 14,36 a 22,22 0 1,1 44,0" fill="none"/>
              <path id="seal-bot" d="M 11,36 a 25,25 0 0,0 50,0" fill="none"/>
            </defs>
            <text font-family="Barlow Condensed, sans-serif" font-weight="600" font-size="5.5" fill="#0077bb" letter-spacing="2">
              <textPath href="#seal-top" startOffset="50%" text-anchor="middle">WEATHER</textPath>
            </text>
            <text font-family="Barlow Condensed, sans-serif" font-weight="600" font-size="5.5" fill="#0077bb" letter-spacing="2">
              <textPath href="#seal-bot" startOffset="50%" text-anchor="middle">BRIEFING</textPath>
            </text>
          </svg>
        </div>
      </div>
      <div class="seal-title">
        <h1>Weather Briefing</h1>
        <div class="tagline">Aviation Dashboard</div>
        <div class="accent-line"></div>
      </div>
    </div>

    <div class="search-section">
      <div class="search-wrap">
        <input type="text" id="city-input" placeholder="City, State…" value="Omaha, NE, US" autocomplete="off">
        <button id="search-btn">Go</button>
      </div>
      <div class="autocomplete-list" id="autocomplete-list"></div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="city-hero" id="city-hero">
      <div class="city-name" id="city-name"></div>
      <div class="description" id="weather-desc"></div>
      <div class="coords" id="coords"></div>
    </div>

    <div class="sidebar-summary" id="sidebar-summary">
      <!-- Temperature hero -->
      <div class="summary-big">
        <div class="big-label">Temperature</div>
        <div class="big-value" id="temp-val">—<span class="big-unit">°C</span></div>
        <div class="big-sub" id="dewpoint-val">Dewpoint: —</div>
      </div>

      <!-- Feels like -->
      <div class="feels-like-card">
        <span class="fl-label">Feels Like</span>
        <span class="fl-value" id="feels-like-val">—<span class="fl-unit">°C</span></span>
      </div>

      <!-- Wind mini -->
      <div class="wind-mini">
        <div class="wind-compass-sm" id="compass">
          <svg viewBox="0 0 54 54">
            <circle cx="27" cy="27" r="25" fill="none" stroke="#a0b8d0" stroke-width="1.5"/>
            <text x="27" y="9" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="Barlow Condensed">N</text>
            <text x="48" y="30" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="Barlow Condensed">E</text>
            <text x="27" y="52" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="Barlow Condensed">S</text>
            <text x="6" y="30" text-anchor="middle" fill="#5a7a9a" font-size="7" font-family="Barlow Condensed">W</text>
            <g id="wind-arrow" transform="rotate(0 27 27)">
              <line x1="27" y1="38" x2="27" y2="14" stroke="#0077bb" stroke-width="2" stroke-linecap="round"/>
              <polygon points="27,12 23,20 31,20" fill="#0077bb"/>
            </g>
          </svg>
        </div>
        <div class="wind-info">
          <div><span class="wind-speed-val" id="wind-speed">—</span> <span class="wind-speed-unit">kts</span></div>
          <div class="wind-dir-text" id="wind-dir">—</div>
        </div>
      </div>

      <!-- Sunrise / Sunset -->
      <div class="sun-times">
        <div class="sun-card">
          <div class="sun-label">Sunrise</div>
          <div class="sun-value" id="sunrise-val">—</div>
        </div>
        <div class="sun-card">
          <div class="sun-label">Sunset</div>
          <div class="sun-value" id="sunset-val">—</div>
        </div>
      </div>
    </div>

    <div class="sidebar-footer" id="footer" style="display:none">
      Updated: <span id="last-updated">—</span>
    </div>
  </aside>

  <!-- RIGHT MAIN AREA -->
  <main class="main-area">
    <div class="main-header">
      <h2>Station Details</h2>
      <div class="update-time" id="update-time"></div>
    </div>

    <div class="grid" id="grid">
      <!-- CEILING -->
      <div class="card" id="card-ceiling">
        <div class="card-label">Cloud Ceiling</div>
        <div class="card-value" id="ceiling-val">—</div>
        <div class="card-sub" id="ceiling-desc">—</div>
      </div>

      <!-- PRESSURE -->
      <div class="card" id="card-pressure">
        <div class="card-label">Barometric Pressure</div>
        <div class="card-value" id="pressure-val">—</div>
        <div class="card-sub" id="pressure-hpa">—</div>
      </div>

      <!-- VISIBILITY -->
      <div class="card" id="card-vis">
        <div class="card-label">Visibility</div>
        <div class="card-value" id="vis-val">—</div>
        <div class="card-sub" id="vis-desc">—</div>
      </div>

      <!-- HUMIDITY -->
      <div class="card" id="card-humidity">
        <div class="card-label">Humidity</div>
        <div class="card-value" id="humidity-val">—</div>
        <div class="card-sub" id="humidity-desc">—</div>
      </div>

      <!-- CLOUD COVER -->
      <div class="card" id="card-clouds">
        <div class="card-label">Cloud Cover</div>
        <div class="card-value" id="clouds-val">—</div>
        <div class="card-sub" id="clouds-desc">—</div>
      </div>

      <!-- WIND GUST / EXTRA -->
      <div class="card" id="card-gust">
        <div class="card-label">Wind Gust</div>
        <div class="card-value" id="gust-val">—</div>
        <div class="card-sub" id="gust-desc">—</div>
      </div>
    </div>
  </main>
</div>

<script>
const API_KEY = '474a55d072011c8c01bd3d67da6d5e49';
const API_URL = 'https://api.openweathermap.org/data/2.5/weather';
const GEO_URL = 'https://api.openweathermap.org/geo/1.0/direct';

const $ = id => document.getElementById(id);

const cityInput = $('city-input');
const searchBtn = $('search-btn');
const errorMsg = $('error-msg');
const cityHero = $('city-hero');
const sidebarSummary = $('sidebar-summary');
const grid = $('grid');
const footer = $('footer');
const acList = $('autocomplete-list');

const CARDINALS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

function degToCardinal(deg) {
  if (deg == null) return 'N/A';
  const idx = Math.round(deg / 22.5) % 16;
  return CARDINALS[idx];
}

function estimateCeiling(cloudsAll, weatherId) {
  if (weatherId >= 800 && weatherId <= 802) return { text: '> 12,000', unit: 'ft MSL', desc: 'Unlimited (estimated)' };
  if (cloudsAll <= 10) return { text: '> 12,000', unit: 'ft MSL', desc: 'Unlimited (estimated)' };
  if (cloudsAll <= 50) return { text: '5,000', unit: 'ft AGL', desc: 'Few / Scattered (estimated)' };
  if (cloudsAll <= 84) return { text: '3,000', unit: 'ft AGL', desc: 'Broken (estimated)' };
  return { text: '1,000', unit: 'ft AGL', desc: 'Overcast (estimated)' };
}

function humidityDesc(h) {
  if (h < 30) return 'Very dry';
  if (h < 50) return 'Comfortable';
  if (h < 70) return 'Moderate';
  if (h < 85) return 'Humid';
  return 'Very humid';
}

function visDesc(sm) {
  if (sm >= 6) return 'Excellent';
  if (sm >= 3) return 'Good';
  if (sm >= 1) return 'Moderate';
  return 'Poor';
}

function cloudDesc(pct) {
  if (pct <= 10) return 'Clear';
  if (pct <= 25) return 'Few';
  if (pct <= 50) return 'Scattered';
  if (pct <= 84) return 'Broken';
  return 'Overcast';
}

function formatUnixTime(unix, tz) {
  const d = new Date((unix + tz) * 1000);
  const h = d.getUTCHours();
  const m = d.getUTCMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
}

function setLoading(on) {
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('loading', on));
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

function hideError() {
  errorMsg.classList.remove('visible');
}

function replayFadeIn() {
  document.querySelectorAll('.card').forEach(c => {
    c.style.animation = 'none';
    c.offsetHeight;
    c.style.animation = '';
  });
}

// ── Autocomplete ──
let acDebounce = null;
let acActive = -1;
let acResults = [];
const acCache = {};

cityInput.addEventListener('input', () => {
  const q = cityInput.value.trim();
  if (q.length < 2) {
    hideAC();
    return;
  }
  clearTimeout(acDebounce);
  acDebounce = setTimeout(() => fetchSuggestions(q), 150);
});

cityInput.addEventListener('keydown', e => {
  if (acList.classList.contains('visible')) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acActive = Math.min(acActive + 1, acResults.length - 1);
      highlightAC();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      acActive = Math.max(acActive - 1, 0);
      highlightAC();
      return;
    }
    if (e.key === 'Enter' && acActive >= 0) {
      e.preventDefault();
      selectAC(acResults[acActive]);
      return;
    }
    if (e.key === 'Escape') {
      hideAC();
      return;
    }
  }
  if (e.key === 'Enter') {
    hideAC();
    const city = cityInput.value.trim();
    if (city) fetchWeather(city);
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-section')) hideAC();
});

async function fetchSuggestions(q) {
  const key = q.toLowerCase();
  if (acCache[key]) {
    acResults = acCache[key];
    acActive = -1;
    renderAC(acResults);
    return;
  }
  try {
    const res = await fetch(`${GEO_URL}?q=${encodeURIComponent(q)}&limit=5&appid=${API_KEY}`);
    if (!res.ok) return;
    const data = await res.json();
    acCache[key] = data;
    acResults = data;
    acActive = -1;
    renderAC(data);
  } catch(e) { /* silent */ }
}

function renderAC(items) {
  if (!items.length) { hideAC(); return; }
  acList.innerHTML = items.map((it, i) => {
    const state = it.state ? `, ${it.state}` : '';
    const country = it.country || '';
    return `<div class="autocomplete-item" data-idx="${i}">
      <span class="ac-city">${it.name}${state}</span>
      <span class="ac-region">${country}</span>
    </div>`;
  }).join('');
  acList.classList.add('visible');

  acList.querySelectorAll('.autocomplete-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      const idx = parseInt(el.dataset.idx);
      selectAC(acResults[idx]);
    });
  });
}

function highlightAC() {
  acList.querySelectorAll('.autocomplete-item').forEach((el, i) => {
    el.classList.toggle('active', i === acActive);
  });
}

function selectAC(item) {
  const state = item.state ? `, ${item.state}` : '';
  const country = item.country ? `, ${item.country}` : '';
  cityInput.value = `${item.name}${state}${country}`;
  hideAC();
  fetchWeatherByCoords(item.lat, item.lon);
}

function hideAC() {
  acList.classList.remove('visible');
  acList.innerHTML = '';
  acResults = [];
  acActive = -1;
}

// ── Weather fetch ──
async function fetchWeather(city) {
  hideError();
  hideAC();
  setLoading(true);
  cityHero.classList.remove('visible');
  sidebarSummary.classList.remove('visible');
  footer.style.display = 'none';

  try {
    const res = await fetch(`${API_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
    if (!res.ok) {
      if (res.status === 404) throw new Error('City not found. Try another search.');
      throw new Error(`API error (${res.status}). Please try again.`);
    }
    const data = await res.json();
    renderWeather(data);
  } catch (err) {
    setLoading(false);
    showError(err.message);
  }
}

async function fetchWeatherByCoords(lat, lon) {
  hideError();
  setLoading(true);
  cityHero.classList.remove('visible');
  sidebarSummary.classList.remove('visible');
  footer.style.display = 'none';

  try {
    const res = await fetch(`${API_URL}?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
    if (!res.ok) throw new Error(`API error (${res.status}).`);
    const data = await res.json();
    renderWeather(data);
  } catch (err) {
    setLoading(false);
    showError(err.message);
  }
}

function renderWeather(d) {
  setLoading(false);
  replayFadeIn();

  // City hero
  const countryCode = d.sys?.country || '';
  $('city-name').textContent = `${d.name}${countryCode ? ', ' + countryCode : ''}`;
  $('weather-desc').textContent = d.weather?.[0]?.description || '';
  $('coords').textContent = `${d.coord?.lat?.toFixed(2)}°N  ${d.coord?.lon?.toFixed(2)}°E`;
  cityHero.classList.add('visible');

  // Sidebar: Temperature
  const temp = d.main?.temp;
  const humidity = d.main?.humidity;
  if (temp != null) {
    $('temp-val').innerHTML = `${temp.toFixed(1)}<span class="big-unit">°C</span>`;
  } else {
    $('temp-val').textContent = 'N/A';
  }

  // Dewpoint
  if (temp != null && humidity != null) {
    const dewpoint = (temp - ((100 - humidity) / 5)).toFixed(1);
    $('dewpoint-val').textContent = `Dewpoint: ${dewpoint}°C`;
  } else {
    $('dewpoint-val').textContent = 'Dewpoint: N/A';
  }

  // Feels like
  const feelsLike = d.main?.feels_like;
  if (feelsLike != null) {
    $('feels-like-val').innerHTML = `${feelsLike.toFixed(1)}<span class="fl-unit">°C</span>`;
  } else {
    $('feels-like-val').textContent = 'N/A';
  }

  // Sidebar: Wind
  const windDeg = d.wind?.deg;
  const windSpeedMs = d.wind?.speed;
  if (windDeg != null) {
    const padded = String(windDeg).padStart(3, '0');
    $('wind-dir').textContent = `${padded}° ${degToCardinal(windDeg)}`;
    $('wind-arrow').setAttribute('transform', `rotate(${(windDeg + 180) % 360} 27 27)`);
  } else {
    $('wind-dir').textContent = 'N/A';
  }
  if (windSpeedMs != null) {
    const kts = (windSpeedMs * 1.94384).toFixed(1);
    $('wind-speed').textContent = kts;
  } else {
    $('wind-speed').textContent = '—';
  }

  // Sunrise / Sunset
  const tz = d.timezone ?? 0;
  if (d.sys?.sunrise) {
    $('sunrise-val').textContent = formatUnixTime(d.sys.sunrise, tz);
  }
  if (d.sys?.sunset) {
    $('sunset-val').textContent = formatUnixTime(d.sys.sunset, tz);
  }

  sidebarSummary.classList.add('visible');

  // Cards: Ceiling
  const cloudsAll = d.clouds?.all ?? 0;
  const weatherId = d.weather?.[0]?.id ?? 800;
  const ceiling = estimateCeiling(cloudsAll, weatherId);
  $('ceiling-val').innerHTML = `${ceiling.text}<span class="card-unit">${ceiling.unit}</span>`;
  $('ceiling-desc').textContent = ceiling.desc;

  // Cards: Pressure
  const pressureHpa = d.main?.pressure;
  if (pressureHpa != null) {
    const inHg = (pressureHpa * 0.02953).toFixed(2);
    $('pressure-val').innerHTML = `${inHg}<span class="card-unit">inHg</span>`;
    $('pressure-hpa').textContent = `${pressureHpa} hPa`;
  } else {
    $('pressure-val').textContent = 'N/A';
    $('pressure-hpa').textContent = '';
  }

  // Cards: Visibility
  const visM = d.visibility;
  if (visM != null) {
    const sm = (visM * 0.000621371).toFixed(1);
    $('vis-val').innerHTML = `${sm}<span class="card-unit">sm</span>`;
    $('vis-desc').textContent = visDesc(parseFloat(sm));
  } else {
    $('vis-val').textContent = 'N/A';
    $('vis-desc').textContent = '';
  }

  // Cards: Humidity
  if (humidity != null) {
    $('humidity-val').innerHTML = `${humidity}<span class="card-unit">%</span>`;
    $('humidity-desc').textContent = humidityDesc(humidity);
  } else {
    $('humidity-val').textContent = 'N/A';
    $('humidity-desc').textContent = '';
  }

  // Cards: Cloud cover
  $('clouds-val').innerHTML = `${cloudsAll}<span class="card-unit">%</span>`;
  $('clouds-desc').textContent = cloudDesc(cloudsAll);

  // Cards: Wind gust
  const gustMs = d.wind?.gust;
  if (gustMs != null) {
    const gustKts = (gustMs * 1.94384).toFixed(1);
    $('gust-val').innerHTML = `${gustKts}<span class="card-unit">kts</span>`;
    $('gust-desc').textContent = gustMs > 10 ? 'Strong gusts' : 'Light gusts';
  } else {
    $('gust-val').innerHTML = `None<span class="card-unit">reported</span>`;
    $('gust-desc').textContent = 'Calm conditions';
  }

  // Timestamp
  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' }) + ' local';
  $('last-updated').textContent = timeStr;
  footer.style.display = '';

  const updateTime = $('update-time');
  updateTime.textContent = `Updated ${timeStr}`;
  updateTime.classList.add('visible');
}

// Events
searchBtn.addEventListener('click', () => {
  hideAC();
  const city = cityInput.value.trim();
  if (city) fetchWeather(city);
});

// Load default city
fetchWeather('Omaha,NE,US');
</script>
</body>
</html>
